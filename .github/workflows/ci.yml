name: ci

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "packages/clearmetric-core[dev,runtime]"
          python -m pip install ruff pyright

      - name: Fail on legacy repo-root spec directory
        run: test ! -d spec

      - name: Run Ruff lint checks
        run: python -m ruff check --select E,F,I --ignore E501 --target-version py311 --extend-exclude .pkgmeta --extend-exclude .pkgsmoke --extend-exclude .pkgtest .

      - name: Run Ruff format check
        run: python -m ruff format --check --target-version py311 --exclude .pkgmeta --exclude .pkgsmoke --exclude .pkgtest .

      - name: Run Pyright
        run: pyright

      - name: Run import-linter
        run: PYTHONPATH=packages/clearmetric-core/src lint-imports

      - name: Fail on legacy name references
        run: |
          if rg -i 'catalogkit' --glob '!.git' --glob '!CHANGELOG.md' --glob '!CONTRIBUTING.md' --glob '!.github/workflows/ci.yml' .; then
            echo "legacy name references remain"
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "packages/clearmetric-core[dev,runtime,release]"

      - name: Run package test suite
        run: python -m pytest -v packages/clearmetric-core/tests

      - name: Run repository boundary checks
        run: |
          python -m pytest -v \
            tests/test_repository_boundaries.py \
            tests/test_backbone_lab_boundaries.py \
            tests/test_cross_package_artifacts.py \
            tests/test_module_independence.py

      - name: Run consumer bundle tests
        run: |
          node --test examples/consumers/shared/test-artifact-kit.mjs
          python -m pytest -v \
            packages/clearmetric-core/tests/consumers/ \
            packages/clearmetric-core/tests/core/test_consumer_schemas.py

      - name: Lineage trust gate
        run: |
          python -m pytest -v \
            packages/clearmetric-core/tests/lineage/test_corpus_invariants.py \
            packages/clearmetric-core/tests/lineage/test_ground_truth.py \
            packages/clearmetric-core/tests/lineage/test_value_lineage_oracle.py \
            packages/clearmetric-core/tests/lineage/test_variant_warning_categories.py
          PYTHONPATH=packages/clearmetric-core \
            python packages/clearmetric-core/scripts/sweep_lineage_coverage.py

  examples-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install editable package for examples smoke
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "packages/clearmetric-core[runtime]"

      - name: Smoke test lineage-demo example
        run: |
          cd examples/lineage-demo
          cm connect warehouse --information-schema ./warehouse_schema.json
          cm scan
          cm compile --format json > /tmp/lineage-demo-graph.json
          python - <<'PY'
          import json
          payload = json.load(open("/tmp/lineage-demo-graph.json"))
          derives = [e for e in payload["edges"] if e["kind"] == "derives_from"]
          assert derives, "expected non-zero derives_from edges from lineage-demo"
          PY
          cm impact orders_base.amount --downstream --format json > /tmp/lineage-demo-impact.json
          python - <<'PY'
          import json
          payload = json.load(open("/tmp/lineage-demo-impact.json"))
          assert payload["related_ids"], "expected non-empty downstream impact"
          assert payload["traversed_edges"], "expected traversed_edges in impact JSON"
          PY
          cm clean
          cm contract /tmp/lineage-demo-graph.json

  release-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distribution artifacts
        run: python -m build packages/clearmetric-core

      - name: Validate package metadata
        run: python -m twine check packages/clearmetric-core/dist/*

      - name: Smoke test installed wheel in /tmp
        run: |
          WHEEL="$(ls -t packages/clearmetric-core/dist/*.whl | head -1)"
          SMOKE_ROOT="$(mktemp -d /tmp/cm-smoke.XXXXXX)"
          cd "$SMOKE_ROOT"
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "$GITHUB_WORKSPACE/$WHEEL"
          python -c "from importlib.resources import files; assert files('clearmetric.spec').joinpath('catalog-artifact.schema.json').is_file()"
          cm --version
          cp -R "$GITHUB_WORKSPACE/examples/lineage-demo" ./project
          cd project
          cm connect warehouse --information-schema ./warehouse_schema.json
          cm scan
          cm compile --format json > graph.json
          python - <<'PY'
          import json
          payload = json.load(open("graph.json"))
          derives = [e for e in payload["edges"] if e["kind"] == "derives_from"]
          assert derives, "wheel smoke: expected non-zero derives_from edges"
          PY
          cm impact orders_base.amount --downstream --format json > impact.json
          python - <<'PY'
          import json
          payload = json.load(open("impact.json"))
          assert payload["related_ids"], "wheel smoke: expected non-empty impact"
          PY
          cm clean
          cm contract graph.json
          python -m clearmetric.cli --help
