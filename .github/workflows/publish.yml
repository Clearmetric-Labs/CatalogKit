name: publish

on:
  push:
    tags:
      - "catalogkit-core-v*"
      - "catalogkit-query-v*"
      - "catalogkit-lineage-v*"
      - "catalogkit-v*"
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        required: true
        type: choice
        options:
          - catalogkit-core
          - catalogkit-query
          - catalogkit-lineage
          - catalogkit

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve package path
        id: package
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PACKAGE="${{ inputs.package }}"
          else
            TAG="${GITHUB_REF_NAME}"
            PACKAGE="${TAG%%-v*}"
          fi

          case "$PACKAGE" in
            catalogkit-core)
              echo "name=catalogkit-core" >> "$GITHUB_OUTPUT"
              echo "path=packages/catalogkit-core" >> "$GITHUB_OUTPUT"
              ;;
            catalogkit-query)
              echo "name=catalogkit-query" >> "$GITHUB_OUTPUT"
              echo "path=packages/catalogkit-query" >> "$GITHUB_OUTPUT"
              ;;
            catalogkit-lineage)
              echo "name=catalogkit-lineage" >> "$GITHUB_OUTPUT"
              echo "path=packages/catalogkit-lineage" >> "$GITHUB_OUTPUT"
              ;;
            catalogkit)
              echo "name=catalogkit" >> "$GITHUB_OUTPUT"
              echo "path=packages/catalogkit" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported package: $PACKAGE" >&2
              exit 1
              ;;
          esac

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Validate package version
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import tomllib

          package_path = Path("${{ steps.package.outputs.path }}")
          pyproject = tomllib.loads(package_path.joinpath("pyproject.toml").read_text(encoding="utf-8"))
          project = pyproject["project"]

          version = project.get("version")
          if version is None:
              dynamic_fields = set(project.get("dynamic", []))
              if "version" not in dynamic_fields:
                  raise SystemExit("Package version is neither static nor declared dynamic.")
              attr = pyproject["tool"]["setuptools"]["dynamic"]["version"]["attr"]
              module_name, attr_name = attr.rsplit(".", 1)
              version_file = package_path / "src" / Path(*module_name.split(".")).with_suffix(".py")
              namespace: dict[str, object] = {}
              exec(version_file.read_text(encoding="utf-8"), namespace)
              version = namespace[attr_name]

          if not isinstance(version, str) or not version.strip():
              raise SystemExit("Resolved package version must be a non-empty string.")

          if os.environ["GITHUB_EVENT_NAME"] == "push":
              tag_name = os.environ["GITHUB_REF_NAME"]
              expected_version = tag_name.rsplit("-v", 1)[-1]
              if version != expected_version:
                  raise SystemExit(
                      f"Tag version {expected_version!r} does not match package version {version!r}."
                  )

          print(f"Validated package version: {version}")
          PY

      - name: Build distribution artifacts
        run: python -m build ${{ steps.package.outputs.path }}

      - name: Validate package metadata
        run: python -m twine check ${{ steps.package.outputs.path }}/dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ steps.package.outputs.path }}/dist
